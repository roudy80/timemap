<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap — Historical Satellite</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', serif;
    background: #0a0a0a;
    color: #e8e0d0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
    pointer-events: none;
  }
  #header > * { pointer-events: auto; }

  #logo {
    font-size: 1.2rem;
    font-weight: bold;
    letter-spacing: 3px;
    color: #c8b89a;
    text-shadow: 0 0 20px rgba(200,184,154,0.5);
    white-space: nowrap;
  }

  #search-box {
    flex: 1;
    max-width: 280px;
    padding: 7px 11px;
    background: rgba(0,0,0,0.68);
    border: 1px solid rgba(200,184,154,0.38);
    border-radius: 4px;
    color: #e8e0d0;
    font-family: Georgia, serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #search-box::placeholder { color: rgba(232,224,208,0.38); }
  #search-box:focus { border-color: rgba(200,184,154,0.75); }

  #search-btn {
    padding: 7px 13px;
    background: rgba(200,184,154,0.12);
    border: 1px solid rgba(200,184,154,0.45);
    border-radius: 4px;
    color: #c8b89a;
    font-family: Georgia, serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  #search-btn:hover { background: rgba(200,184,154,0.28); }

  #search-status {
    font-size: 0.7rem;
    color: rgba(200,184,154,0.5);
    white-space: nowrap;
    min-width: 24px;
  }

  /* ── Map ── */
  #map { flex: 1; width: 100%; }

  /* CSS filter applied dynamically via <style id="tile-filter"> */

  /* ── Time Panel ── */
  #time-panel {
    background: linear-gradient(to top, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.82) 100%);
    border-top: 1px solid rgba(200,184,154,0.16);
    padding: 10px 20px 6px;
    user-select: none;
  }

  #panel-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 2px;
  }

  #year-display {
    font-size: 2.5rem;
    font-weight: bold;
    letter-spacing: 8px;
    color: #c8b89a;
    text-shadow: 0 0 28px rgba(200,184,154,0.4);
    line-height: 1;
    min-width: 120px;
    text-align: center;
  }

  #layer-badge {
    font-size: 0.68rem;
    letter-spacing: 1px;
    padding: 3px 8px;
    border: 1px solid rgba(200,184,154,0.28);
    border-radius: 3px;
    white-space: nowrap;
    transition: background 0.3s, color 0.3s, border-color 0.3s;
  }
  #layer-badge.sat  { color: #7ec8f0; border-color: rgba(126,200,240,0.4); background: rgba(126,200,240,0.06); }
  #layer-badge.map  { color: #c8b89a; border-color: rgba(200,184,154,0.3); background: rgba(200,184,154,0.05); }
  #layer-badge.new  { border-color: rgba(126,200,240,0.7); background: rgba(126,200,240,0.12); }

  #era-label {
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 3px;
    color: rgba(200,184,154,0.5);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Slider track + thumb */
  #year-slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: linear-gradient(to right,
      #7ec8f0 0%,
      #7ec8f0 var(--sat-end, 88%),
      #c8b89a var(--sat-end, 88%),
      #c8b89a var(--pct, 100%),
      rgba(200,184,154,0.2) var(--pct, 100%));
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  /* Blue segment = satellite archive era */
  #year-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #c8b89a;
    box-shadow: 0 0 10px rgba(200,184,154,0.55);
    cursor: grab;
    transition: background 0.3s, box-shadow 0.3s;
  }
  #year-slider.in-sat::-webkit-slider-thumb {
    background: #7ec8f0;
    box-shadow: 0 0 12px rgba(126,200,240,0.7);
  }
  #year-slider::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #c8b89a;
    border: none;
    box-shadow: 0 0 10px rgba(200,184,154,0.55);
    cursor: grab;
  }

  /* Tick marks */
  #year-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 0.6rem;
    color: rgba(200,184,154,0.35);
    letter-spacing: 1px;
  }

  /* Legend under slider */
  #slider-legend {
    display: flex;
    justify-content: flex-end;
    gap: 14px;
    margin-top: 4px;
    font-size: 0.6rem;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-dot.sat { background: #7ec8f0; }
  .legend-dot.map { background: #c8b89a; }
  .legend-label { color: rgba(200,184,154,0.4); }

  #photo-status {
    text-align: center;
    font-size: 0.68rem;
    color: rgba(200,184,154,0.42);
    margin-top: 5px;
    min-height: 1em;
    font-style: italic;
  }

  /* ── Photo Strip ── */
  #photo-strip-wrap {
    background: rgba(0,0,0,0.92);
    border-top: 1px solid rgba(200,184,154,0.1);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.45s ease;
  }
  #photo-strip-wrap.open { max-height: 175px; }

  #photo-strip {
    display: flex;
    gap: 8px;
    padding: 9px 14px;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(200,184,154,0.22) transparent;
  }
  #photo-strip::-webkit-scrollbar { height: 3px; }
  #photo-strip::-webkit-scrollbar-thumb { background: rgba(200,184,154,0.22); border-radius: 2px; }

  .photo-card {
    flex-shrink: 0;
    width: 124px;
    border: 1px solid rgba(200,184,154,0.16);
    border-radius: 3px;
    overflow: hidden;
    background: #111;
    text-decoration: none;
    transition: border-color 0.2s, transform 0.15s;
  }
  .photo-card:hover { border-color: rgba(200,184,154,0.5); transform: translateY(-2px); }
  .photo-card img { width: 100%; height: 104px; object-fit: cover; display: block; filter: sepia(12%); }
  .photo-card-info { padding: 4px 5px; }
  .photo-card-title {
    font-size: 0.57rem; color: rgba(200,184,154,0.7); line-height: 1.3;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .photo-card-date { font-size: 0.55rem; color: rgba(200,184,154,0.38); margin-top: 2px; }
  #photo-empty { font-size: 0.7rem; color: rgba(200,184,154,0.28); font-style: italic; padding: 0 14px; display: flex; align-items: center; min-height: 120px; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block; width: 9px; height: 9px;
    border: 2px solid rgba(200,184,154,0.22); border-top-color: #c8b89a;
    border-radius: 50%; animation: spin 0.65s linear infinite;
    margin-right: 5px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Leaflet overrides ── */
  .leaflet-control-zoom { border: 1px solid rgba(200,184,154,0.26) !important; border-radius: 4px !important; }
  .leaflet-control-zoom a { background: rgba(0,0,0,0.72) !important; color: #c8b89a !important; border-bottom: 1px solid rgba(200,184,154,0.16) !important; }
  .leaflet-control-zoom a:hover { background: rgba(200,184,154,0.14) !important; }
  .leaflet-control-attribution { background: rgba(0,0,0,0.48) !important; color: rgba(200,184,154,0.32) !important; font-size: 0.58rem !important; }
  .leaflet-control-attribution a { color: rgba(200,184,154,0.42) !important; }
</style>
</head>
<body>

<div id="header">
  <div id="logo">TIMEMAP</div>
  <input id="search-box" type="text" placeholder="Search a city…" autocomplete="off" value="Austin, TX"/>
  <button id="search-btn">Go</button>
  <span id="search-status"></span>
</div>

<div id="map"></div>

<div id="time-panel">
  <div id="panel-top">
    <div id="year-display">2025</div>
    <div id="layer-badge" class="sat">🛰 Loading archive…</div>
  </div>
  <div id="era-label">Satellite Archive</div>
  <input id="year-slider" type="range" min="1900" max="2025" value="2025" step="1" class="in-sat"/>
  <div id="year-ticks">
    <span>1900</span><span>1920</span><span>1940</span><span>1960</span><span>1980</span><span>2000</span><span>2025</span>
  </div>
  <div id="slider-legend">
    <div class="legend-item"><div class="legend-dot map"></div><div class="legend-label">Historical maps</div></div>
    <div class="legend-item"><div class="legend-dot sat"></div><div class="legend-label">Real satellite archive</div></div>
  </div>
  <div id="photo-status">Slide below 2000 to see Library of Congress archival photos</div>
</div>

<div id="photo-strip-wrap">
  <div id="photo-strip"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────

// North Austin / Domain area — highest visible growth 2014-2025
const DEFAULT_LAT   = 30.4015;
const DEFAULT_LNG   = -97.7456;
const DEFAULT_ZOOM  = 15;   // High enough to see individual roads + buildings
const DEFAULT_QUERY = 'Austin Texas';

const WAYBACK_CONFIG_URL = 'https://s3-us-west-2.amazonaws.com/config.maptiles.arcgis.com/waybackconfig.json';
const WAYBACK_TILE_URL   = (v) => `https://wayback.maptiles.arcgis.com/arcgis/rest/services/World_Imagery/WMTS/1.0.0/default028mm/MapServer/tile/${v}/{z}/{y}/{x}`;

// Satellite range on the slider (2014-2025 = ESRI Wayback archive)
const SAT_START = 2014;
const SAT_END   = 2025;

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Static tile layers for pre-satellite eras
const STATIC_LAYERS = [
  { min: 2000, max: 2013,
    url:   'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    attr:  '© ESRI World Imagery',
    label: 'Early 21st Century', badge: '🛰 Satellite (current)', cls: 'sat',
    filter: 'brightness(0.95) contrast(1.02)' },

  { min: 1970, max: 1999,
    url:   'https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}',
    attr:  '© USGS National Map',
    label: 'Late 20th Century', badge: '🗺 USGS Topo', cls: 'map',
    filter: 'sepia(22%) brightness(0.92) contrast(1.03)' },

  { min: 1940, max: 1969,
    url:   'https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}',
    attr:  '© Nat. Geographic, ESRI',
    label: 'Mid 20th Century', badge: '🗺 Atlas Style', cls: 'map',
    filter: 'sepia(52%) brightness(0.88) contrast(1.06)' },

  { min: 1900, max: 1939,
    url:   'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
    attr:  '© ESRI World Topo',
    label: 'Historical Era', badge: '🗺 Vintage Map', cls: 'map',
    filter: 'sepia(80%) grayscale(20%) brightness(0.82) contrast(1.12)' },
];

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────

let currentYear      = 2025;
let locationQuery    = DEFAULT_QUERY;
let activeLayer      = null;
let activeReleaseNum = null;   // currently loaded wayback release number
let activeStaticKey  = null;   // currently loaded static layer URL (for non-wayback)

// ALL monthly wayback snapshots: [{year, month, releaseNum, label}], newest first
let waybackSnapshots = [];
let waybackReady     = false;

let fetchTimer  = null;
let switchTimer = null;
let moveTimer   = null;

// ─────────────────────────────────────────────────────────────────────────────
// DYNAMIC CSS FILTER
// ─────────────────────────────────────────────────────────────────────────────

const tileFilter = document.createElement('style');
tileFilter.id = 'tile-filter';
document.head.appendChild(tileFilter);

function setFilter(css) {
  tileFilter.textContent = `#map .leaflet-tile-pane { filter: ${css || 'none'}; transition: filter 0.9s ease; }`;
}

// ─────────────────────────────────────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────────────────────────────────────

const map = L.map('map', {
  center: [DEFAULT_LAT, DEFAULT_LNG],
  zoom: DEFAULT_ZOOM,
  zoomControl: false,
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

// Kick off with current ESRI satellite so the map isn't blank while Wayback loads
activeLayer = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: '© ESRI World Imagery', maxZoom: 19 }
).addTo(map);

// ─────────────────────────────────────────────────────────────────────────────
// WAYBACK CONFIG LOAD
// ─────────────────────────────────────────────────────────────────────────────

async function loadWaybackConfig() {
  try {
    const resp = await fetch(WAYBACK_CONFIG_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // Parse every snapshot — keep all monthly entries
    waybackSnapshots = data
      .map(entry => {
        const m = (entry.itemTitle || '').match(/Wayback (\d{4})-(\d{2})-(\d{2})/);
        if (!m) return null;
        const y = +m[1], mo = +m[2];
        return {
          year: y, month: mo,
          releaseNum: entry.releaseNum,
          label: `${MONTH_NAMES[mo - 1]} ${y}`,   // e.g. "Jun 2019"
          numericDate: y * 100 + mo,               // for sorting/searching
        };
      })
      .filter(Boolean)
      .sort((a, b) => b.numericDate - a.numericDate); // newest first

    waybackReady = true;
    console.log(`Wayback: ${waybackSnapshots.length} monthly snapshots loaded (${waybackSnapshots[waybackSnapshots.length-1].year}–${waybackSnapshots[0].year})`);

    // Now load the correct snapshot for the current year
    applyLayerForYear(currentYear, true);

  } catch (err) {
    console.warn('Wayback config failed:', err);
    waybackReady = false;
    updateBadgeAndLabel(currentYear, null);
  }
}

// Find snapshot closest to mid-year (July) for a given integer year.
// Returns null if no snapshots available or year out of Wayback range.
function snapshotForYear(year) {
  if (!waybackReady || !waybackSnapshots.length) return null;
  if (year < waybackSnapshots[waybackSnapshots.length - 1].year) return null;
  if (year > waybackSnapshots[0].year) return waybackSnapshots[0];

  // Target: July of the requested year (mid-year gives most complete imagery)
  const targetDate = year * 100 + 7;
  let best = null, bestDist = Infinity;
  for (const s of waybackSnapshots) {
    const dist = Math.abs(s.numericDate - targetDate);
    if (dist < bestDist) { bestDist = dist; best = s; }
    // Early exit — since sorted newest first, once we pass the target year by more than 12 months we can stop
    if (s.year < year - 1) break;
  }
  return best;
}

// ─────────────────────────────────────────────────────────────────────────────
// LAYER LOGIC
// ─────────────────────────────────────────────────────────────────────────────

function getStaticLayerConfig(year) {
  return STATIC_LAYERS.find(l => year >= l.min && year <= l.max) || null;
}

function applyLayerForYear(year, force = false) {
  if (year >= SAT_START) {
    // ── Satellite / Wayback era ──
    if (!waybackReady) {
      // Config still loading — keep placeholder satellite, do nothing
      return;
    }
    const snap = snapshotForYear(year);
    if (!snap) return;

    if (!force && snap.releaseNum === activeReleaseNum) {
      // Same snapshot already loaded
      return;
    }

    swapLayer(
      WAYBACK_TILE_URL(snap.releaseNum),
      `© <a href="https://livingatlas.arcgis.com/wayback/" target="_blank">ESRI Wayback</a> ${snap.label}`,
      'none'   // no CSS filter — let the real imagery speak
    );
    activeReleaseNum = snap.releaseNum;
    activeStaticKey  = null;
    updateBadgeAndLabel(year, snap);

  } else {
    // ── Historical map era ──
    const cfg = getStaticLayerConfig(year);
    if (!cfg) return;

    if (!force && cfg.url === activeStaticKey) return; // already showing this layer

    swapLayer(cfg.url, cfg.attr, cfg.filter);
    activeReleaseNum = null;
    activeStaticKey  = cfg.url;
    updateBadgeAndLabel(year, null);
    setFilter(cfg.filter);
  }
}

function swapLayer(url, attr, filter) {
  const newLayer = L.tileLayer(url, { attribution: attr, maxZoom: 19 });
  newLayer.addTo(map);

  const old = activeLayer;
  if (old) {
    // Wait a beat for new tiles to start rendering before pulling the old layer
    setTimeout(() => { try { map.removeLayer(old); } catch (e) {} }, 900);
  }
  activeLayer = newLayer;
  setFilter(filter);
}

// Debounce the actual layer switch so we don't fire 30 XHR requests while dragging
function scheduleLayerSwitch(year) {
  clearTimeout(switchTimer);
  // Satellite range: faster response (300ms) — more distinct snapshots
  // Map range: slower (500ms) — fewer layers, less urgency
  const delay = year >= SAT_START ? 300 : 500;
  switchTimer = setTimeout(() => applyLayerForYear(year), delay);
}

// ─────────────────────────────────────────────────────────────────────────────
// UI UPDATES
// ─────────────────────────────────────────────────────────────────────────────

function updateBadgeAndLabel(year, snap) {
  const badge = document.getElementById('layer-badge');

  if (year >= SAT_START) {
    if (snap) {
      badge.textContent = `🛰 ${snap.label}`;
      badge.className = 'sat';
    } else if (!waybackReady) {
      badge.textContent = '🛰 Loading archive…';
      badge.className = 'sat';
    } else {
      badge.textContent = '🛰 Satellite';
      badge.className = 'sat';
    }
    document.getElementById('era-label').textContent = 'Satellite Archive · ESRI World Imagery Wayback';
  } else {
    const cfg = getStaticLayerConfig(year);
    badge.textContent = cfg ? cfg.badge : '🗺 Map';
    badge.className = 'map';
    document.getElementById('era-label').textContent = cfg ? cfg.label : '';
  }

  // Flash the badge briefly to signal the layer changed
  badge.classList.add('new');
  setTimeout(() => badge.classList.remove('new'), 600);
}

function setYear(year) {
  currentYear = year;

  document.getElementById('year-display').textContent = year;

  // Slider gradient: blue for satellite zone, gold for map zone
  const totalRange = 2025 - 1900;
  const satStartPct = ((SAT_START - 1900) / totalRange * 100).toFixed(1) + '%';
  const pct = ((year - 1900) / totalRange * 100).toFixed(1) + '%';

  const sl = document.getElementById('year-slider');
  sl.style.setProperty('--sat-end', satStartPct);
  sl.style.setProperty('--pct', pct);
  sl.classList.toggle('in-sat', year >= SAT_START);

  // Photo strip
  if (year >= 2000) {
    closePhotoStrip();
    document.getElementById('photo-status').textContent =
      year >= SAT_START
        ? 'Drag left to explore the satellite archive · zoom in to see roads appear'
        : 'Slide below 2000 to see Library of Congress archival photos';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// PHOTO STRIP
// ─────────────────────────────────────────────────────────────────────────────

function openPhotoStrip()  { document.getElementById('photo-strip-wrap').classList.add('open'); }
function closePhotoStrip() {
  document.getElementById('photo-strip-wrap').classList.remove('open');
  document.getElementById('photo-strip').innerHTML = '';
}

function renderPhotos(results) {
  const strip = document.getElementById('photo-strip');
  strip.innerHTML = '';
  if (!results || !results.length) {
    strip.innerHTML = '<div id="photo-empty">No archival photos found for this location and era.</div>';
    openPhotoStrip(); return;
  }
  results.forEach(item => {
    if (!item.image_url) return;
    const card = document.createElement('a');
    card.className = 'photo-card';
    card.href = item.url || '#';
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.innerHTML = `
      <img src="${esc(item.image_url)}" alt="${esc(item.title||'')}" loading="lazy"
           onerror="this.closest('.photo-card').style.display='none'"/>
      <div class="photo-card-info">
        <div class="photo-card-title">${esc(item.title||'Untitled')}</div>
        <div class="photo-card-date">${esc(item.date||'')}</div>
      </div>`;
    strip.appendChild(card);
  });
  openPhotoStrip();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────────────────────
// LOC FETCH
// ─────────────────────────────────────────────────────────────────────────────

async function fetchPhotos(year, query) {
  if (year >= 2000) return;
  const from = Math.max(1900, year - 10);
  const to   = Math.min(1999, year + 10);
  const statusEl = document.getElementById('photo-status');
  statusEl.innerHTML = '<span class="spinner"></span>Searching Library of Congress…';
  try {
    const url = `https://www.loc.gov/search/?q=${encodeURIComponent(query)}&fo=json&fa=online-format:image&dates=${from}/${to}&at=results&c=20`;
    const resp = await fetch(url, { headers: { Accept: 'application/json' } });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const results = (data.results || []).filter(r => r.image_url);
    statusEl.textContent = results.length
      ? `${results.length} archival photo${results.length !== 1 ? 's' : ''} · ${from}–${to}`
      : `No photos found for "${query}" in ${from}–${to}`;
    renderPhotos(results);
  } catch (err) {
    console.warn('LOC:', err);
    statusEl.textContent = 'Could not reach Library of Congress';
    closePhotoStrip();
  }
}

function scheduleFetch(delay = 800) {
  clearTimeout(fetchTimer);
  fetchTimer = setTimeout(() => fetchPhotos(currentYear, locationQuery), delay);
}

// ─────────────────────────────────────────────────────────────────────────────
// GEOCODE
// ─────────────────────────────────────────────────────────────────────────────

async function geocode(query) {
  const statusEl = document.getElementById('search-status');
  statusEl.innerHTML = '<span class="spinner"></span>';
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`;
    const resp = await fetch(url, { headers: { 'User-Agent': 'TimeMapApp/1.0' } });
    const data = await resp.json();
    if (!data.length) { statusEl.textContent = 'Not found'; return; }
    locationQuery = query;
    statusEl.textContent = '';
    map.flyTo([parseFloat(data[0].lat), parseFloat(data[0].lon)], 15, { duration: 1.5 });
    if (currentYear < 2000) scheduleFetch(1600);
  } catch (err) { statusEl.textContent = 'Error'; }
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────────────────────────────────────

document.getElementById('year-slider').addEventListener('input', function () {
  const y = parseInt(this.value, 10);
  setYear(y);
  scheduleLayerSwitch(y);
  if (y < 2000) scheduleFetch(900);
});

map.on('moveend', () => {
  if (currentYear >= 2000) return;
  clearTimeout(moveTimer);
  moveTimer = setTimeout(() => {
    const c = map.getCenter();
    locationQuery = `${c.lat.toFixed(3)},${c.lng.toFixed(3)}`;
    fetchPhotos(currentYear, locationQuery);
  }, 1200);
});

const searchBox = document.getElementById('search-box');
document.getElementById('search-btn').addEventListener('click', () => {
  const q = searchBox.value.trim(); if (q) geocode(q);
});
searchBox.addEventListener('keydown', e => {
  if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) geocode(q); }
});

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────

setYear(2025);
setFilter('none');
loadWaybackConfig();   // async — upgrades layer once config arrives
</script>
