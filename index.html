<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap — Travel Through History</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', serif;
    background: #0a0a0a;
    color: #e8e0d0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Dynamic tile filter injected by JS ── */
  /* See: filterStyle element created in script */

  /* ── Header ── */
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.82) 0%, transparent 100%);
    pointer-events: none;
  }
  #header > * { pointer-events: auto; }

  #logo {
    font-size: 1.3rem;
    font-weight: bold;
    letter-spacing: 3px;
    color: #c8b89a;
    text-shadow: 0 0 20px rgba(200,184,154,0.5);
    white-space: nowrap;
  }

  #search-box {
    flex: 1;
    max-width: 300px;
    padding: 7px 12px;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(200,184,154,0.4);
    border-radius: 4px;
    color: #e8e0d0;
    font-family: Georgia, serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #search-box::placeholder { color: rgba(232,224,208,0.4); }
  #search-box:focus { border-color: rgba(200,184,154,0.8); }

  #search-btn {
    padding: 7px 14px;
    background: rgba(200,184,154,0.15);
    border: 1px solid rgba(200,184,154,0.5);
    border-radius: 4px;
    color: #c8b89a;
    font-family: Georgia, serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  #search-btn:hover { background: rgba(200,184,154,0.3); }

  #search-status {
    font-size: 0.72rem;
    color: rgba(200,184,154,0.55);
    white-space: nowrap;
  }

  /* ── Map ── */
  #map { flex: 1; width: 100%; }

  /* ── Time Panel ── */
  #time-panel {
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.8) 100%);
    border-top: 1px solid rgba(200,184,154,0.18);
    padding: 10px 20px 6px;
    user-select: none;
  }

  #panel-top {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 14px;
    margin-bottom: 2px;
  }

  #year-display {
    font-size: 2.6rem;
    font-weight: bold;
    letter-spacing: 8px;
    color: #c8b89a;
    text-shadow: 0 0 30px rgba(200,184,154,0.4);
    line-height: 1;
  }

  #layer-badge {
    font-size: 0.68rem;
    letter-spacing: 1.5px;
    color: rgba(200,184,154,0.55);
    text-transform: uppercase;
    border: 1px solid rgba(200,184,154,0.25);
    border-radius: 3px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  #layer-badge.loading { color: rgba(200,184,154,0.8); border-color: rgba(200,184,154,0.5); }

  #era-label {
    text-align: center;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: rgba(200,184,154,0.55);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  #year-slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: linear-gradient(to right, #c8b89a var(--pct, 100%), rgba(200,184,154,0.22) var(--pct, 100%));
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #year-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #c8b89a;
    box-shadow: 0 0 10px rgba(200,184,154,0.6);
    cursor: grab;
  }
  #year-slider::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #c8b89a;
    border: none;
    box-shadow: 0 0 10px rgba(200,184,154,0.6);
    cursor: grab;
  }

  #year-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 0.62rem;
    color: rgba(200,184,154,0.38);
    letter-spacing: 1px;
  }

  #photo-status {
    text-align: center;
    font-size: 0.7rem;
    color: rgba(200,184,154,0.45);
    margin-top: 5px;
    min-height: 1em;
    font-style: italic;
  }

  /* ── Photo Strip ── */
  #photo-strip-wrap {
    background: rgba(0,0,0,0.92);
    border-top: 1px solid rgba(200,184,154,0.12);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.45s ease;
  }
  #photo-strip-wrap.open { max-height: 175px; }

  #photo-strip {
    display: flex;
    gap: 8px;
    padding: 9px 14px;
    overflow-x: auto;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: rgba(200,184,154,0.25) transparent;
  }
  #photo-strip::-webkit-scrollbar { height: 3px; }
  #photo-strip::-webkit-scrollbar-thumb { background: rgba(200,184,154,0.25); border-radius: 2px; }

  .photo-card {
    flex-shrink: 0;
    width: 126px;
    cursor: pointer;
    border: 1px solid rgba(200,184,154,0.18);
    border-radius: 3px;
    overflow: hidden;
    background: #111;
    text-decoration: none;
    transition: border-color 0.2s, transform 0.15s;
  }
  .photo-card:hover { border-color: rgba(200,184,154,0.55); transform: translateY(-2px); }

  .photo-card img {
    width: 100%; height: 106px;
    object-fit: cover;
    display: block;
    filter: sepia(15%);
  }
  .photo-card-info { padding: 4px 5px; }
  .photo-card-title {
    font-size: 0.58rem;
    color: rgba(200,184,154,0.72);
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .photo-card-date { font-size: 0.56rem; color: rgba(200,184,154,0.4); margin-top: 2px; }

  #photo-empty {
    font-size: 0.72rem;
    color: rgba(200,184,154,0.3);
    font-style: italic;
    padding: 0 14px;
    display: flex;
    align-items: center;
    min-height: 120px;
  }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 9px; height: 9px;
    border: 2px solid rgba(200,184,154,0.25);
    border-top-color: #c8b89a;
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    margin-right: 5px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Era transition overlay (flash effect when layer switches) ── */
  #era-flash {
    position: absolute;
    inset: 0;
    z-index: 500;
    background: rgba(0,0,0,0);
    pointer-events: none;
    transition: background 0.15s;
  }
  #era-flash.flash { background: rgba(0,0,0,0.18); }

  /* ── Leaflet overrides ── */
  .leaflet-control-zoom {
    border: 1px solid rgba(200,184,154,0.28) !important;
    border-radius: 4px !important;
  }
  .leaflet-control-zoom a {
    background: rgba(0,0,0,0.72) !important;
    color: #c8b89a !important;
    border-bottom: 1px solid rgba(200,184,154,0.18) !important;
  }
  .leaflet-control-zoom a:hover { background: rgba(200,184,154,0.15) !important; }
  .leaflet-control-attribution {
    background: rgba(0,0,0,0.5) !important;
    color: rgba(200,184,154,0.35) !important;
    font-size: 0.58rem !important;
  }
  .leaflet-control-attribution a { color: rgba(200,184,154,0.45) !important; }
</style>
</head>
<body>

<div id="header">
  <div id="logo">TIMEMAP</div>
  <input id="search-box" type="text" placeholder="Search a city…" autocomplete="off" value="Austin, TX"/>
  <button id="search-btn">Go</button>
  <span id="search-status"></span>
</div>

<div id="map">
  <div id="era-flash"></div>
</div>

<div id="time-panel">
  <div id="panel-top">
    <div id="year-display">2025</div>
    <div id="layer-badge">🛰 Loading…</div>
  </div>
  <div id="era-label">Present Day</div>
  <input id="year-slider" type="range" min="1900" max="2025" value="2025" step="1"/>
  <div id="year-ticks">
    <span>1900</span><span>1920</span><span>1940</span><span>1960</span><span>1980</span><span>2000</span><span>2025</span>
  </div>
  <div id="photo-status">Slide back in time to see historical photos</div>
</div>

<div id="photo-strip-wrap">
  <div id="photo-strip"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────

const DEFAULT_LAT   = 30.2672;
const DEFAULT_LNG   = -97.7431;
const DEFAULT_ZOOM  = 13;
const DEFAULT_QUERY = 'Austin Texas';

// Tile layer URLs (all free, no key needed)
const TILES = {
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  usgs_topo: 'https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}',
  natgeo:    'https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}',
  world_topo:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
};

const TILE_ATTR = {
  satellite:  '© <a href="https://www.arcgis.com">ESRI</a> World Imagery',
  usgs_topo:  '© <a href="https://www.usgs.gov">USGS</a> National Map',
  natgeo:     '© <a href="https://www.arcgis.com">ESRI</a>, National Geographic',
  world_topo: '© <a href="https://www.arcgis.com">ESRI</a> World Topo',
};

const WAYBACK_CONFIG_URL = 'https://s3-us-west-2.amazonaws.com/config.maptiles.arcgis.com/waybackconfig.json';
const WAYBACK_TILE = (v) => `https://wayback.maptiles.arcgis.com/arcgis/rest/services/World_Imagery/WMTS/1.0.0/default028mm/MapServer/tile/${v}/{z}/{y}/{x}`;

// Era definitions — what tile source + CSS filter to use per year range
const ERAS = [
  {
    min: 2014, max: 2025,
    tile: 'wayback',             // Real historical satellite from Wayback archive
    label: 'Satellite Archive',
    badge: '🛰 Satellite',
    filter: 'none',              // No filter — let actual imagery speak
  },
  {
    min: 2000, max: 2013,
    tile: 'satellite',           // Current ESRI satellite (wayback only goes to 2014)
    label: 'Early 21st Century',
    badge: '🛰 Satellite',
    filter: 'brightness(0.96) contrast(1.02)',
  },
  {
    min: 1970, max: 1999,
    tile: 'usgs_topo',           // Switch to USGS topo — no true satellite for this era
    label: 'Late 20th Century',
    badge: '🗺 USGS Topo',
    filter: 'sepia(25%) brightness(0.92) contrast(1.04)',
  },
  {
    min: 1940, max: 1969,
    tile: 'natgeo',              // National Geographic atlas style
    label: 'Mid 20th Century',
    badge: '🗺 Atlas Style',
    filter: 'sepia(55%) brightness(0.87) contrast(1.07)',
  },
  {
    min: 1900, max: 1939,
    tile: 'world_topo',          // ESRI vintage topo — closest to historical printed maps
    label: 'Historical Era',
    badge: '🗺 Vintage Map',
    filter: 'sepia(82%) grayscale(22%) brightness(0.81) contrast(1.13)',
  },
];

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────

let currentYear        = 2025;
let locationQuery      = DEFAULT_QUERY;
let activeLayer        = null;
let activeEraKey       = null;       // e.g. 'wayback_64001' or 'usgs_topo'
let waybackSnapshots   = [];         // [{year, releaseNum}] sorted desc
let fetchTimer         = null;
let switchTimer        = null;
let moveTimer          = null;
let filterTimer        = null;
let waybackLoaded      = false;

// ─────────────────────────────────────────────────────────────────────────────
// DYNAMIC CSS FILTER  (injected into <head> so it covers newly added tile layers)
// ─────────────────────────────────────────────────────────────────────────────

const filterStyle = document.createElement('style');
document.head.appendChild(filterStyle);

function applyFilter(filter) {
  filterStyle.textContent = `
    #map .leaflet-tile-pane {
      filter: ${filter || 'none'};
      transition: filter 1.0s ease;
    }`;
}

// ─────────────────────────────────────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────────────────────────────────────

const map = L.map('map', {
  center: [DEFAULT_LAT, DEFAULT_LNG],
  zoom: DEFAULT_ZOOM,
  zoomControl: false,
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ─────────────────────────────────────────────────────────────────────────────
// WAYBACK CONFIG
// ─────────────────────────────────────────────────────────────────────────────

async function loadWaybackConfig() {
  try {
    const resp = await fetch(WAYBACK_CONFIG_URL);
    const data = await resp.json();

    const parsed = data
      .map(entry => {
        const m = (entry.itemTitle || '').match(/Wayback (\d{4})-(\d{2})-(\d{2})/);
        if (!m) return null;
        return { year: +m[1], month: +m[2], releaseNum: entry.releaseNum };
      })
      .filter(Boolean);

    // Sort descending
    parsed.sort((a, b) => b.year - a.year || b.month - a.month);

    // One snapshot per year (most recent for that year)
    const seen = new Set();
    waybackSnapshots = parsed.filter(s => {
      if (seen.has(s.year)) return false;
      seen.add(s.year);
      return true;
    });

    waybackLoaded = true;
    console.log(`Wayback: ${waybackSnapshots.length} yearly snapshots, ${waybackSnapshots[waybackSnapshots.length-1].year}–${waybackSnapshots[0].year}`);

    // Re-apply layer now that we have real data
    switchLayer(currentYear, true);
  } catch (err) {
    console.warn('Wayback config load failed, using current satellite for all years ≥ 2000:', err);
    waybackLoaded = false;
    // Init fallback immediately
    switchLayer(currentYear, true);
  }
}

function findWaybackVersion(year) {
  if (!waybackSnapshots.length) return null;
  const snap = waybackSnapshots.find(s => s.year <= year)
            || waybackSnapshots[waybackSnapshots.length - 1];
  return snap;
}

// ─────────────────────────────────────────────────────────────────────────────
// ERA HELPERS
// ─────────────────────────────────────────────────────────────────────────────

function getEra(year) {
  return ERAS.find(e => year >= e.min && year <= e.max) || ERAS[0];
}

function getLayerKey(year) {
  const era = getEra(year);
  if (era.tile === 'wayback') {
    if (!waybackLoaded) return 'satellite';           // fallback until loaded
    const snap = findWaybackVersion(year);
    return snap ? `wayback_${snap.releaseNum}` : 'satellite';
  }
  return era.tile;
}

// ─────────────────────────────────────────────────────────────────────────────
// LAYER SWITCHING
// ─────────────────────────────────────────────────────────────────────────────

function createLayer(year) {
  const era = getEra(year);

  if (era.tile === 'wayback' && waybackLoaded) {
    const snap = findWaybackVersion(year);
    if (snap) {
      return L.tileLayer(WAYBACK_TILE(snap.releaseNum), {
        attribution: `© <a href="https://www.arcgis.com">ESRI</a> Wayback ${snap.year}`,
        maxZoom: 19,
        maxNativeZoom: 19,
      });
    }
  }

  // Non-wayback or fallback
  const tileKey = (era.tile === 'wayback') ? 'satellite' : era.tile;
  return L.tileLayer(TILES[tileKey], {
    attribution: TILE_ATTR[tileKey],
    maxZoom: 19,
  });
}

function flashEra() {
  const f = document.getElementById('era-flash');
  f.classList.add('flash');
  setTimeout(() => f.classList.remove('flash'), 200);
}

function switchLayer(year, immediate = false) {
  const newKey = getLayerKey(year);
  if (newKey === activeEraKey && !immediate) return; // no change needed

  activeEraKey = newKey;
  const newLayer = createLayer(year);
  newLayer.addTo(map);

  if (activeLayer) {
    const old = activeLayer;
    setTimeout(() => map.removeLayer(old), 900);
  }

  activeLayer = newLayer;
  updateBadge(year);
  if (!immediate) flashEra();
}

function scheduleLayerSwitch(year, delay = 500) {
  clearTimeout(switchTimer);
  switchTimer = setTimeout(() => switchLayer(year), delay);
}

// ─────────────────────────────────────────────────────────────────────────────
// YEAR / ERA UPDATE
// ─────────────────────────────────────────────────────────────────────────────

function updateBadge(year) {
  const era = getEra(year);
  const badge = document.getElementById('layer-badge');
  let text = era.badge;

  if (era.tile === 'wayback' && waybackLoaded) {
    const snap = findWaybackVersion(year);
    if (snap) text += ` ${snap.year}`;
  }

  badge.textContent = text;
  badge.classList.remove('loading');
}

function setYear(year) {
  currentYear = year;

  document.getElementById('year-display').textContent = year;
  document.getElementById('era-label').textContent = getEra(year).label;

  // Slider gradient
  const pct = ((year - 1900) / 125) * 100;
  document.getElementById('year-slider').style.setProperty('--pct', pct + '%');

  // CSS filter (debounced slightly for smoothness)
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => applyFilter(getEra(year).filter), 40);

  // Photo strip
  if (year >= 2000) {
    closePhotoStrip();
    document.getElementById('photo-status').textContent = 'Slide back in time to see historical photos';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// PHOTO STRIP
// ─────────────────────────────────────────────────────────────────────────────

function openPhotoStrip() {
  document.getElementById('photo-strip-wrap').classList.add('open');
}
function closePhotoStrip() {
  document.getElementById('photo-strip-wrap').classList.remove('open');
  document.getElementById('photo-strip').innerHTML = '';
}

function renderPhotos(results) {
  const strip = document.getElementById('photo-strip');
  strip.innerHTML = '';

  if (!results || !results.length) {
    strip.innerHTML = '<div id="photo-empty">No archival photos found for this location and era.</div>';
    openPhotoStrip();
    return;
  }

  results.forEach(item => {
    const thumb = item.image_url;
    if (!thumb) return;

    const card = document.createElement('a');
    card.className = 'photo-card';
    card.href = item.url || '#';
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.title = item.title || '';
    card.innerHTML = `
      <img src="${esc(thumb)}" alt="${esc(item.title || '')}" loading="lazy"
           onerror="this.closest('.photo-card').style.display='none'"/>
      <div class="photo-card-info">
        <div class="photo-card-title">${esc(item.title || 'Untitled')}</div>
        <div class="photo-card-date">${esc(item.date || '')}</div>
      </div>`;
    strip.appendChild(card);
  });

  openPhotoStrip();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────────────────────
// LIBRARY OF CONGRESS FETCH
// ─────────────────────────────────────────────────────────────────────────────

async function fetchPhotos(year, query) {
  if (year >= 2000) return;
  const from = Math.max(1900, year - 10);
  const to   = Math.min(1999, year + 10);
  const statusEl = document.getElementById('photo-status');

  statusEl.innerHTML = '<span class="spinner"></span>Searching Library of Congress…';

  const url = `https://www.loc.gov/search/?q=${encodeURIComponent(query)}&fo=json&fa=online-format:image&dates=${from}/${to}&at=results&c=20`;

  try {
    const resp = await fetch(url, { headers: { Accept: 'application/json' } });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const results = (data.results || []).filter(r => r.image_url);

    statusEl.textContent = results.length
      ? `${results.length} archival photo${results.length !== 1 ? 's' : ''} · ${from}–${to}`
      : `No photos found for "${query}" in ${from}–${to}`;

    renderPhotos(results);
  } catch (err) {
    console.warn('LOC fetch error:', err);
    statusEl.textContent = 'Could not reach Library of Congress';
    closePhotoStrip();
  }
}

function scheduleFetch(delay = 800) {
  clearTimeout(fetchTimer);
  fetchTimer = setTimeout(() => fetchPhotos(currentYear, locationQuery), delay);
}

// ─────────────────────────────────────────────────────────────────────────────
// NOMINATIM GEOCODE
// ─────────────────────────────────────────────────────────────────────────────

async function geocode(query) {
  const statusEl = document.getElementById('search-status');
  statusEl.innerHTML = '<span class="spinner"></span>';

  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`;
    const resp = await fetch(url, { headers: { 'User-Agent': 'TimeMapApp/1.0' } });
    const data = await resp.json();

    if (!data.length) { statusEl.textContent = 'Not found'; return; }

    const { lat, lon } = data[0];
    locationQuery = query;
    statusEl.textContent = '';
    map.flyTo([parseFloat(lat), parseFloat(lon)], 13, { duration: 1.5 });

    if (currentYear < 2000) scheduleFetch(1600);
  } catch (err) {
    statusEl.textContent = 'Search error';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────────────────────────────────────────

const slider = document.getElementById('year-slider');

slider.addEventListener('input', () => {
  const y = parseInt(slider.value, 10);
  setYear(y);
  scheduleLayerSwitch(y, 550);
  if (y < 2000) scheduleFetch(900);
});

map.on('moveend', () => {
  if (currentYear >= 2000) return;
  clearTimeout(moveTimer);
  moveTimer = setTimeout(() => {
    const c = map.getCenter();
    locationQuery = `${c.lat.toFixed(3)},${c.lng.toFixed(3)}`;
    fetchPhotos(currentYear, locationQuery);
  }, 1200);
});

const searchBtn = document.getElementById('search-btn');
const searchBox = document.getElementById('search-box');

searchBtn.addEventListener('click', () => {
  const q = searchBox.value.trim();
  if (q) geocode(q);
});
searchBox.addEventListener('keydown', e => {
  if (e.key === 'Enter') { const q = searchBox.value.trim(); if (q) geocode(q); }
});

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────

document.getElementById('layer-badge').classList.add('loading');
